name: Deploy to Amplify Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate Amplify outputs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-northeast-1
        run: npx ampx generate outputs --app-id dkcmgnfwojthr --branch main

      - name: Build
        run: npm run build

      - name: Create deployment artifact
        run: |
          cd out && zip -r ../deployment.zip . && cd ..
          ls -lh deployment.zip

      - name: Deploy to Amplify
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-northeast-1
          AMPLIFY_APP_ID: dkcmgnfwojthr
        run: |
          # Install AWS CLI
          pip install awscli

          # Create deployment
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id $AMPLIFY_APP_ID \
            --branch-name main \
            --region $AWS_REGION)

          JOB_ID=$(echo $DEPLOYMENT | jq -r '.jobId')
          UPLOAD_URL=$(echo $DEPLOYMENT | jq -r '.zipUploadUrl')

          echo "Job ID: $JOB_ID"

          # Upload ZIP
          curl -X PUT \
            -H "Content-Type: application/zip" \
            --data-binary @deployment.zip \
            "$UPLOAD_URL"

          echo "Deployment created: $JOB_ID"
